name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee vitest-output.log

      - name: Upload Vitest output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-output
          path: vitest-output.log

      - name: Build
        run: npm run build

      - name: Smoke test MCP server
        shell: bash
        run: |
          set -o pipefail
          npm run smoke 2>&1 | tee smoke-output.log

      - name: Upload smoke output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-output
          path: smoke-output.log

      - name: Smoke test CLI
        shell: bash
        run: |
          set -o pipefail
          npm run smoke:cli 2>&1 | tee cli-smoke-output.log

      - name: Upload CLI smoke output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cli-smoke-output
          path: cli-smoke-output.log
